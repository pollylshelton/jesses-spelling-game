<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jesse's Spelling Prize Game</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Comic+Neue:wght@700&display=swap');
        body {
            font-family: 'Comic Neue', cursive;
            background: linear-gradient(135deg, #fef9c3 0%, #fde68a 100%);
            min-height: 100vh;
        }
        .letter-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        .bounce {
            animation: bounce 0.5s infinite alternate;
        }
        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-5px); }
        }
    </style>
</head>
<body class="p-4 flex flex-col items-center justify-center">

    <!-- Game Container -->
    <div id="game-container" class="bg-white p-8 rounded-3xl shadow-2xl max-w-2xl w-full border-4 border-yellow-400">
        
        <!-- Header -->
        <div id="header" class="text-center mb-6">
            <h1 class="text-4xl font-bold text-blue-600 mb-2">Hello, Jesse! 🚀</h1>
            <p class="text-xl text-purple-600">Let's try hangman and win £££!</p>
        </div>

        <!-- Start Screen -->
        <div id="start-screen" class="text-center py-10">
            <button onclick="startGame()" class="bg-green-500 hover:bg-green-600 text-white text-3xl px-12 py-6 rounded-full shadow-lg transform transition active:scale-95 bounce">
                Start New Game! 🎮
            </button>
        </div>

        <!-- Game Play Screen -->
        <div id="play-screen" class="hidden">
            <div class="flex justify-between items-center mb-6 bg-blue-50 p-4 rounded-xl">
                <div class="text-lg">Round: <span id="current-round" class="font-bold text-blue-600">1</span>/10</div>
                <div class="text-lg">Lives: <span id="lives-display" class="font-bold text-red-500">❤️❤️❤️</span></div>
            </div>

            <div class="text-center mb-8">
                <button onclick="speakWord()" class="bg-purple-500 hover:bg-purple-600 text-white px-6 py-3 rounded-2xl flex items-center justify-center mx-auto gap-2 shadow-md">
                    <span>🔊</span> Hear the word
                </button>
            </div>

            <div id="word-display" class="flex flex-wrap justify-center gap-2 mb-8 text-4xl font-bold tracking-widest text-gray-800">
                <!-- Blanks go here -->
            </div>

            <div id="keyboard" class="grid grid-cols-7 sm:grid-cols-9 gap-2">
                <!-- Buttons generated by JS -->
            </div>
        </div>

        <!-- Prize Screen -->
        <div id="prize-screen" class="hidden text-center py-8">
            <h2 class="text-5xl font-bold text-yellow-500 mb-4">FINISH! 🏆</h2>
            <div id="prize-message" class="text-3xl mb-8 text-gray-700"></div>
            
            <div class="flex flex-col gap-4 items-center">
                <button id="whatsapp-btn" class="bg-green-500 hover:bg-green-600 text-white px-8 py-4 rounded-2xl text-xl flex items-center gap-2 shadow-lg transition transform hover:scale-105">
                    <span>💬</span> Message Mum for Prize
                </button>
                
                <button onclick="location.reload()" class="text-blue-500 underline font-bold py-2">Play Again</button>
            </div>
        </div>

    </div>

    <script>
        // MENTOR TIP: Put your phone number here (starting with country code, e.g., 447123456789)
        const MUMS_PHONE_NUMBER = "YOUR_PHONE_NUMBER_HERE"; 

        const year5Words = [
            "accommodate", "according", "achieve", "aggressive", "amateur", "ancient", "apparent", "appreciate", 
            "attached", "available", "average", "awkward", "bargain", "bruise", "category", "cemetery", 
            "committee", "communicate", "community", "competition", "conscience", "conscious", "controversy", 
            "convenience", "correspond", "criticise", "curiosity", "definite", "desperate", "determined", 
            "develop", "dictionary", "disastrous", "embarrass", "environment", "equip", "equipped", "equipment", 
            "especially", "exaggerate", "excellent", "existence", "explanation", "familiar", "foreign", 
            "forty", "frequently", "government", "guarantee", "harass", "hindrance", "identity", "immediate", 
            "immediately", "individual", "interfere", "interrupt", "language", "leisure", "lightning", 
            "marvellous", "mischievous", "muscle", "necessary", "neighbour", "nuisance", "occupy", "occur", 
            "opportunity", "parliament", "persuade", "physical", "prejudice", "privilege", "profession", 
            "programme", "pronunciation", "queue", "recognise", "recommend", "relevant", "restaurant", 
            "rhyme", "rhythm", "sacrifice", "secretary", "shoulder", "signature", "sincere", "sincerely", 
            "soldier", "stomach", "sufficient", "suggest", "symbol", "system", "temperature", "thorough", 
            "twelfth", "variety", "vegetable", "vehicle", "yacht"
        ];

        let currentRound = 1;
        let totalRounds = 10;
        let lives = 3;
        let currentWord = "";
        let guessedLetters = [];

        function startGame() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('play-screen').classList.remove('hidden');
            setupRound();
        }

        function setupRound() {
            if (currentRound > totalRounds) {
                showPrize();
                return;
            }
            currentWord = year5Words[Math.floor(Math.random() * year5Words.length)].toLowerCase();
            guessedLetters = [];
            updateUI();
            createKeyboard();
            speakWord();
        }

        function createKeyboard() {
            const kb = document.getElementById('keyboard');
            kb.innerHTML = '';
            const alphabet = 'abcdefghijklmnopqrstuvwxyz'.split('');
            alphabet.forEach(letter => {
                const btn = document.createElement('button');
                btn.innerText = letter.toUpperCase();
                btn.className = 'letter-btn bg-white border-2 border-blue-200 p-2 rounded-lg font-bold hover:bg-blue-100 transition shadow-sm text-lg';
                btn.onclick = () => guess(letter, btn);
                kb.appendChild(btn);
            });
        }

        function updateUI() {
            document.getElementById('current-round').innerText = currentRound;
            let hearts = "";
            for(let i=0; i<3; i++) {
                hearts += i < lives ? "❤️" : "🖤";
            }
            document.getElementById('lives-display').innerText = hearts;
            const display = document.getElementById('word-display');
            display.innerHTML = '';
            currentWord.split('').forEach(char => {
                const span = document.createElement('span');
                span.className = 'border-b-4 border-blue-400 w-8 text-center';
                span.innerText = guessedLetters.includes(char) ? char.toUpperCase() : '';
                display.appendChild(span);
            });
        }

        function guess(letter, btn) {
            btn.disabled = true;
            if (currentWord.includes(letter)) {
                guessedLetters.push(letter);
                btn.classList.add('bg-green-200', 'border-green-500');
                checkWin();
            } else {
                lives--;
                btn.classList.add('bg-red-200', 'border-red-500');
                if (lives <= 0) showPrize();
            }
            updateUI();
        }

        function checkWin() {
            const isWon = currentWord.split('').every(l => guessedLetters.includes(l));
            if (isWon) {
                setTimeout(() => {
                    currentRound++;
                    setupRound();
                }, 800);
            }
        }

        function speakWord() {
            const msg = new SpeechSynthesisUtterance();
            msg.text = `The word is: ${currentWord}`;
            msg.rate = 0.8;
            window.speechSynthesis.speak(msg);
        }

        function showPrize() {
            document.getElementById('play-screen').classList.add('hidden');
            document.getElementById('prize-screen').classList.remove('hidden');
            
            let amount = 0;
            let subtext = "";
            
            if (lives === 3) { amount = 3; subtext = "Perfect spelling, Jesse! Amazing job!"; }
            else if (lives === 2) { amount = 2; subtext = "Great work! One mistake made."; }
            else if (lives === 1) { amount = 1; subtext = "You did it! Hard work pays off!"; }
            else { amount = 0; subtext = "No prize this time, but practice makes perfect!"; }

            const prizeMsg = document.getElementById('prize-message');
            prizeMsg.innerHTML = `
                <div class="text-6xl mb-4">💰 £${amount} 💰</div>
                <div class="text-xl text-gray-600">${subtext}</div>
            `;

            // Setup WhatsApp Button
            const waBtn = document.getElementById('whatsapp-btn');
            if (amount > 0) {
                const message = `Hi Mum! I just finished my Spelling Game with ${lives} lives left. I won £${amount}! 🏆`;
                const waUrl = `https://wa.me/${MUMS_PHONE_NUMBER}?text=${encodeURIComponent(message)}`;
                waBtn.onclick = () => window.open(waUrl, '_blank');
                waBtn.classList.remove('hidden');
            } else {
                waBtn.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
